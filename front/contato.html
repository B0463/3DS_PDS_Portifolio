<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio - Contato</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="projetos.html">Projetos</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="contato">
      <h1>Contato</h1>
      <p>Preencha o formulário abaixo para entrar em contato.</p>

      <form id="form-contato" action="#" method="post">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required />

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required />

        <label for="assunto">Assunto</label>
        <input type="text" id="assunto" name="assunto" required />

        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

        <button type="submit">Enviar</button>
      </form>

      <div id="contato-status" role="status" aria-live="polite"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 - Henri Kim Portfólio</p>
  </footer>

  <script src="assets/js/main.js" defer></script>
</body>
</html>
